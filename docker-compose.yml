version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: familytree_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-familytree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-familytree_secret}
      POSTGRES_DB: ${POSTGRES_DB:-familytree}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familytree"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: familytree_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-familytree}:${POSTGRES_PASSWORD:-familytree_secret}@postgres:5432/${POSTGRES_DB:-familytree}
      SECRET_KEY: ${SECRET_KEY:-super-secret-jwt-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-*}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: familytree_web
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
