server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA - all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to FastAPI backend (internal Docker network)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml;
}
